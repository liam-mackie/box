name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-test-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-test-

      - name: Stamp version
        run: make version-stamp

      - name: Test
        run: swift test

  proxy:
    name: box-proxy tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: proxy

      - name: Test
        working-directory: proxy
        run: cargo test --locked

      - name: Check embedded assets are regenerated
        run: |
          make gen-assets
          git diff --exit-code Sources/BoxKit/EmbeddedAssets.swift
