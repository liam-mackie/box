# box egress proxy.
# Only destinations matching the allowlist are permitted; everything else gets
# the custom 403 page (deny.html) telling you how to allow it.

# The listening port is rendered at runtime by the entrypoint into the include
# below. When this squid is built `--with-openssl` (SSL-Bump capable) the line is
#   http_port 3128 ssl-bump tls-cert=<dummy> generate-host-certificates=on …
# so we can PEEK the TLS ClientHello and SPLICE on the real SNI (no decryption),
# closing the spoofed-CONNECT / `.github.com`-exfil hole. When the apt squid is
# NOT ssl-bump-capable, the entrypoint renders a plain `http_port 3128` and we
# fall back to today's hostname-only (CONNECT host) filtering — the box still
# works, just without SNI verification. The entrypoint detects which at startup.
include /etc/squid/box-port.acl

# The live, host-editable allowlist (bind-mounted at runtime).
# A leading dot (".example.com") matches the domain and all subdomains.
#
# squid's dstdomain ACL natively reads multiple files, so the global and a
# trusted per-project allowlist are unioned simply by listing both files:
#   acl allowlist dstdomain "/etc/box/allowlist.txt" "/etc/box/allowlist.project.txt"
# But squid REFUSES to parse if any listed file is absent, and the project file
# exists only when a project `.box/` has been trusted. So the actual ACL line is
# rendered at runtime by the entrypoint (1 file or 2) into the include below,
# right before `squid -k parse`. The global "/etc/box/allowlist.txt" is always
# present (materialized by the host); the project file is added only when trusted.
include /etc/squid/box-allowlist.acl

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Refuse tunnels to anything but 443, and refuse unsafe ports outright.
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

# SNI peek-and-splice (default-on when ssl-bump is available) + opt-in MITM bump.
# Rendered at runtime by the entrypoint into the include below:
#   * ssl-bump capable, no MITM: an `acl sni_allow ssl::server_name` over the SAME
#     allowlist file(s) as the dstdomain ACL, then
#       ssl_bump peek step1      — read the ClientHello (SNI), no decryption
#       ssl_bump splice sni_allow — tunnel allowed SNIs straight through
#       ssl_bump terminate all    — kill connections whose SNI isn't allowed
#     This is what defeats a spoofed CONNECT host header: the splice/terminate
#     decision is made on the REAL SNI, not the (forgeable) CONNECT target.
#   * ssl-bump capable, MITM on (`tlsInspect`): additionally `ssl_bump bump` ONLY
#     the explicitly-listed `bumpHosts`; everything else (Anthropic/Claude API,
#     npm, git, …) is still spliced so cert-pinned / auth-sensitive clients work.
#   * NOT ssl-bump capable: rendered empty (no ssl_bump rules) — fallback path.
include /etc/squid/box-sslbump.acl

# Allow allowlisted destinations; deny (with our page) everything else.
http_access allow allowlist
deny_info ERR_ACCESS_DENIED all
http_access deny all

# We are a forwarding proxy, not a cache.
cache deny all

# Custom egress-audit log format with stable, parseable fields (see EgressLog.swift).
# Fields: epoch.ms  client  result/HTTPstatus  bytes  method  url  real-SNI
#   %ts.%03tu   request time, epoch seconds + millis
#   %>a         client address
#   %Ss/%03>Hs  squid result code (e.g. TCP_DENIED) / upstream HTTP status
#   %<st        total bytes sent to the client
#   %rm         request method
#   %ru         request URL (host:port for CONNECT tunnels)
#   %ssl::>sni  the real TLS SNI from the ClientHello (peeked, not decrypted) —
#               this is what `box log` attributes traffic to, defeating spoofed
#               CONNECT host headers. Empty ("-") for plain HTTP.
#
# The `%ssl::>sni` logformat code only exists in an SSL-Bump-capable squid; the
# GnuTLS build Debian ships rejects it (`Unsupported %code`). So the `logformat
# box …` line itself is rendered by the entrypoint into the include below: with
# the real `%ssl::>sni` field when ssl-bump is available, or a static "-" in that
# 7th column on the hostname-only fallback (keeping the field count stable so
# EgressLog's parser — which already maps "-" to "no SNI" — is unaffected).
include /etc/squid/box-logformat.acl
access_log stdio:/var/log/squid/access.log box
cache_log stdio:/var/log/squid/cache.log
visible_hostname box
shutdown_lifetime 1 second
forwarded_for delete
via off
